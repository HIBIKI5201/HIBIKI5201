<svg
  id="logo-composed"
  xmlns="http://www.w3.org/2000/svg"
  version="2.0"
  viewBox="0 0 1254 1254"
  role="img"
  aria-labelledby="title desc">
  <title id="title">YT Personal Brand Logo Composed</title>
  <desc id="desc">Editable composed logo that references split SVG parts as layers.</desc>

  <g id="background">
    <rect
      id="background-black"
      x="0"
      y="0"
      width="1254"
      height="1254"
      fill="#010101" />
  </g>

  <g id="hexagon-frame">
    <image
      id="hexagon-frame-ref"
      href="parts/hexagon-frame.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>

  <g id="staff">
    <image
      id="staff-ref"
      href="parts/staff.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>

  <g id="music-symbols">
    <image
      id="music-symbols-ref"
      href="parts/music-symbols.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>

  <g id="circuit-board">
    <image
      id="circuit-board-ref"
      href="parts/circuit-board.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>

  <g id="programming-text">
    <image
      id="programming-text-ref"
      href="parts/programming-text.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>

  <g id="bat">
    <image
      id="bat-ref"
      href="parts/bat.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>

  <g id="yt-letters">
    <image
      id="yt-letters-ref"
      href="parts/yt-letters.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>

  <g id="sword">
    <image
      id="sword-ref"
      href="parts/sword.svg"
      x="0"
      y="0"
      width="1254"
      height="1254"
      preserveAspectRatio="xMidYMid meet" />
  </g>
</svg>
